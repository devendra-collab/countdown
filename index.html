<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to July 15</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,500;1,600&family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base: #05020a;
    --cream: #F7F1E8;
    --gold: #FFD700;
    --coral: #FF3366;
    --neon-blue: #00F3FF;
    --neon-purple: #B53CFF;
    --lavender: #C4B5E3;
    --card-radius: 32px;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    min-height:100vh;
    background:var(--bg-base);
    color:var(--cream);
    font-family:'Sora', sans-serif;
    overflow:hidden;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    perspective: 1000px;
  }

  /* --- Dynamic Aurora Background --- */
  .aurora-container {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    background: var(--bg-base);
  }
  
  .aurora {
    position: absolute;
    width: 200vw;
    height: 200vh;
    top: -50vh;
    left: -50vw;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(181, 60, 255, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 30%, rgba(0, 243, 255, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(255, 51, 102, 0.1) 0%, transparent 50%);
    filter: blur(60px);
    animation: aurora-move 20s linear infinite alternate;
  }

  @keyframes aurora-move {
    0% { transform: rotate(0deg) scale(1); filter: blur(60px) hue-rotate(0deg); }
    50% { transform: rotate(180deg) scale(1.1); filter: blur(80px) hue-rotate(45deg); }
    100% { transform: rotate(360deg) scale(1); filter: blur(60px) hue-rotate(90deg); }
  }

  /* Canvases for stars, trails, confetti */
  #stars-canvas, #trail-canvas, #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  #confetti-canvas {
    z-index: 10;
  }

  /* --- Glassmorphism Ticket --- */
  .stage {
    position: relative;
    z-index: 5;
    perspective: 1500px;
  }
  
  .ticket {
    position: relative;
    width: 100%;
    max-width: 540px;
    background: rgba(20, 15, 30, 0.35);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: var(--card-radius);
    padding: 48px 40px 40px;
    text-align: center;
    transform-style: preserve-3d;
    box-shadow: 
      0 30px 60px -20px rgba(0,0,0,0.8),
      inset 0 0 20px rgba(255,255,255,0.05),
      0 0 40px rgba(181, 60, 255, 0.15);
    transition: transform 0.1s linear, box-shadow 0.3s ease;
    animation: float-card 6s ease-in-out infinite alternate, rise 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    opacity: 0;
  }

  @keyframes float-card {
    0% { transform: translateY(0px) translateX(0px); }
    100% { transform: translateY(-12px) translateX(5px); }
  }

  @keyframes rise {
    0% { opacity: 0; transform: translateY(50px) scale(0.9) rotateX(-10deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotateX(0); }
  }

  .ticket.tick-pulse {
    box-shadow: 
      0 30px 60px -20px rgba(0,0,0,0.8),
      inset 0 0 20px rgba(255,255,255,0.08),
      0 0 60px rgba(0, 243, 255, 0.25);
  }

  .reveal {
    opacity: 0;
    transform: translateY(15px) translateZ(30px);
    animation: reveal-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes reveal-in {
    100% { opacity: 1; transform: translateY(0) translateZ(30px); }
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
  }
  .eyebrow .star {
    animation: spin-twinkle 3s linear infinite;
    display: inline-block;
  }
  @keyframes spin-twinkle {
    0% { transform: rotate(0deg) scale(1); filter: brightness(1); }
    50% { transform: rotate(180deg) scale(1.4); filter: brightness(1.5); }
    100% { transform: rotate(360deg) scale(1); filter: brightness(1); }
  }

  .headline {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-style: italic;
    font-size: clamp(32px, 7vw, 44px);
    line-height: 1.1;
    margin: 0 0 8px;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
  }
  .headline .name {
    border-bottom: 2px dashed rgba(255,255,255,0.3);
    padding-bottom: 2px;
    cursor: text;
    outline: none;
    transition: all 0.3s ease;
    background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 8px rgba(181, 60, 255, 0.5));
  }
  .headline .name:focus {
    border-bottom-color: var(--neon-blue);
    filter: drop-shadow(0 0 15px rgba(0, 243, 255, 0.8));
  }
  .headline .name:empty::before {
    content: "Your";
    color: rgba(255,255,255,0.3);
    -webkit-text-fill-color: rgba(255,255,255,0.3);
  }

  .date-line {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--neon-blue);
    letter-spacing: 0.1em;
    margin-bottom: 36px;
    text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
  }

  .perf {
    position: relative;
    height: 1px;
    margin: 0 -40px 36px;
    background-image: repeating-linear-gradient(to right, rgba(255,255,255,0.2) 0 6px, transparent 6px 14px);
  }
  .perf::before, .perf::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 24px; height: 24px;
    background: var(--bg-base);
    border-radius: 50%;
    transform: translateY(-50%);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
  }
  .perf::before { left: -12px; }
  .perf::after { right: -12px; }

  /* --- Enhanced Flip Countdown --- */
  .digits {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 12px;
    transform: translateZ(40px); /* Parallax layer */
  }
  .digit-group {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .digit-flip {
    perspective: 500px;
    width: 100%;
    height: clamp(50px, 12vw, 70px);
  }
  .flip-card {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .flip-card.flipped {
    transform: rotateX(-180deg);
  }
  .flip-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(38px, 10vw, 54px);
    font-variant-numeric: tabular-nums;
    line-height: 1;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: inset 0 2px 10px rgba(255,255,255,0.1), 0 5px 15px rgba(0,0,0,0.5);
    color: var(--cream);
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
  }
  
  .flip-face::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 50%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, transparent 100%);
    border-radius: 12px 12px 0 0;
    pointer-events: none;
  }

  .flip-back {
    transform: rotateX(180deg);
    color: var(--neon-blue);
    text-shadow: 0 0 20px rgba(0, 243, 255, 0.8);
    background: rgba(0, 243, 255, 0.05);
    border-color: rgba(0, 243, 255, 0.2);
  }

  .digit-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--lavender);
    margin-top: 12px;
    opacity: 0.8;
  }

  /* --- Glowing Progress Tube --- */
  .progress-wrap {
    margin: 32px 0 36px;
    text-align: left;
    transform: translateZ(20px);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--lavender);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .progress-track {
    height: 8px;
    border-radius: 8px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.05);
    position: relative;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
  }
  .progress-fill {
    height: 100%;
    border-radius: 8px;
    background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
    width: 0%;
    transition: width 1s cubic-bezier(0.2, 0.8, 0.2, 1);
    position: relative;
    box-shadow: 0 0 15px var(--neon-blue), 0 0 5px var(--neon-purple);
  }
  .progress-fill::after {
    content: "";
    position: absolute;
    top: 0; right: 0; bottom: 0; width: 20px;
    background: #fff;
    filter: blur(4px);
    opacity: 0.8;
    border-radius: 50%;
    transform: translateX(50%);
  }


  /* --- Glassy Buttons --- */
  .actions {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    transform: translateZ(30px);
  }
  .btn {
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 14px 24px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    color: var(--cream);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .btn::before {
    content: "";
    position: absolute;
    top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: skewX(-20deg);
    transition: left 0.6s ease;
  }
  .btn:hover::before { left: 150%; }
  .btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: var(--neon-blue);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.1);
  }
  .btn:active { transform: scale(0.96); }
  
  .btn.primary {
    background: linear-gradient(135deg, var(--neon-purple), var(--coral));
    border: none;
    box-shadow: 0 4px 15px rgba(181, 60, 255, 0.4);
  }
  .btn.primary:hover {
    box-shadow: 0 8px 25px rgba(255, 51, 102, 0.6);
    filter: brightness(1.1);
  }

  /* --- Celebration State --- */
  .celebrate-text {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 700;
    font-size: clamp(28px, 8vw, 40px);
    margin: 0 0 24px;
    display: none;
    background: linear-gradient(to right, #FFD700, #FF3366, #00F3FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbow-glow 3s linear infinite, pop-in-bounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes rainbow-glow {
    0% { filter: hue-rotate(0deg) drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
    100% { filter: hue-rotate(360deg) drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
  }
  @keyframes pop-in-bounce {
    0% { opacity: 0; transform: scale(0.5); }
    60% { opacity: 1; transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .ticket.done .digits,
  .ticket.done .progress-wrap,
  .ticket.done .perf { display: none; }
  .ticket.done .celebrate-text { display: block; }

  @media (max-width: 480px){
    .ticket { padding: 32px 24px; }
    .digits { gap: 8px; }
    .perf { margin-left: -24px; margin-right: -24px; }
  }

</style>
</head>
<body>

<div class="aurora-container">
  <div class="aurora"></div>
</div>
<canvas id="stars-canvas"></canvas>
<canvas id="trail-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>

<div class="stage" id="stage">
<main class="ticket" id="ticket">
  <p class="eyebrow reveal"><span class="star">✦</span> Countdown <span class="star">✦</span></p>
  <h1 class="headline reveal">
    <span class="name" contenteditable="true" spellcheck="false" aria-label="Edit name">Dristi</span>'s Birthday
  </h1>
  <p class="date-line reveal">JULY&nbsp;15 · MARK THE CALENDAR</p>

  <div class="perf reveal" aria-hidden="true"></div>

  <p class="celebrate-text">The magic is here! ✨</p>

  <div class="digits reveal">
    <div class="digit-group">
      <div class="digit-flip" id="flip-days">
        <div class="flip-card">
          <div class="flip-face flip-front">00</div>
          <div class="flip-face flip-back">00</div>
        </div>
      </div>
      <span class="digit-label">Days</span>
    </div>
    <div class="digit-group">
      <div class="digit-flip" id="flip-hours">
        <div class="flip-card">
          <div class="flip-face flip-front">00</div>
          <div class="flip-face flip-back">00</div>
        </div>
      </div>
      <span class="digit-label">Hrs</span>
    </div>
    <div class="digit-group">
      <div class="digit-flip" id="flip-mins">
        <div class="flip-card">
          <div class="flip-face flip-front">00</div>
          <div class="flip-face flip-back">00</div>
        </div>
      </div>
      <span class="digit-label">Min</span>
    </div>
    <div class="digit-group">
      <div class="digit-flip" id="flip-secs">
        <div class="flip-card">
          <div class="flip-face flip-front">00</div>
          <div class="flip-face flip-back">00</div>
        </div>
      </div>
      <span class="digit-label">Sec</span>
    </div>
  </div>

  <div class="progress-wrap reveal">
    <div class="progress-label">
      <span id="progress-pct">0% there</span>
      <span>since last birthday</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>


  <div class="actions reveal">
    <button class="btn primary" id="calendarBtn">Add to calendar</button>
    <button class="btn" id="shareBtn">Copy countdown</button>
  </div>
</main>
</div>

<script>
(function(){
  // --- Stagger Entrances ---
  document.querySelectorAll('.reveal').forEach((el, i) => {
    el.style.animationDelay = (0.2 + i * 0.1) + 's';
  });

  // --- 3D Parallax & Tilt Effect ---
  const stage = document.getElementById('stage');
  const ticket = document.getElementById('ticket');
  let tiltEnabled = window.matchMedia('(pointer: fine)').matches;
  let targetRotX = 0, targetRotY = 0;
  let currentRotX = 0, currentRotY = 0;

  window.addEventListener('mousemove', (e) => {
    if(!tiltEnabled) return;
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const dx = (e.clientX - cx) / cx; // -1 to 1
    const dy = (e.clientY - cy) / cy;
    
    targetRotY = dx * 12; // max 12 deg
    targetRotX = -dy * 12;
  });

  window.addEventListener('mouseleave', () => {
    targetRotX = 0; targetRotY = 0;
  });

  // Smooth animation loop for 3D tilt
  function lerp(start, end, amt) {
    return (1 - amt) * start + amt * end;
  }
  
  function render3D() {
    currentRotX = lerp(currentRotX, targetRotX, 0.1);
    currentRotY = lerp(currentRotY, targetRotY, 0.1);
    
    // Only apply if not animating rise
    if (getComputedStyle(ticket).opacity === "1") {
      ticket.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
    }
    requestAnimationFrame(render3D);
  }
  render3D();


  // --- Starry Background Canvas ---
  const starCanvas = document.getElementById('stars-canvas');
  const starCtx = starCanvas.getContext('2d');
  let stars = [];

  function initStars() {
    starCanvas.width = window.innerWidth;
    starCanvas.height = window.innerHeight;
    stars = [];
    for(let i=0; i<150; i++) {
      stars.push({
        x: Math.random() * starCanvas.width,
        y: Math.random() * starCanvas.height,
        r: Math.random() * 1.5 + 0.5,
        alpha: Math.random(),
        vAlpha: (Math.random() * 0.02) - 0.01
      });
    }
  }
  
  function drawStars() {
    starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
    stars.forEach(s => {
      s.alpha += s.vAlpha;
      if (s.alpha <= 0.1 || s.alpha >= 1) s.vAlpha *= -1;
      starCtx.beginPath();
      starCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      starCtx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
      starCtx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  window.addEventListener('resize', initStars);
  initStars();
  drawStars();

  // --- Interactive Mouse Trail ---
  const trailCanvas = document.getElementById('trail-canvas');
  const trailCtx = trailCanvas.getContext('2d');
  trailCanvas.width = window.innerWidth;
  trailCanvas.height = window.innerHeight;
  let particles = [];
  let mouse = { x: -100, y: -100 };

  const prankUrls = [
    'https://media.tenor.com/lUi-FNTaUH8AAAAC/gorrila-dancing.gif',
    'dog.png',
    'https://media1.tenor.com/m/fjFefVXbjosAAAAC/funny-dog-dance-dancing-dog.gif'
  ];
  
  const prankWords = [
    'WOW!', 'OMG', 'GOTCHA!', 'PRANKED!', 'DANCE!', 'LOL', 'HACKED'
  ];

  const bgPrankUrls = [
    'https://media1.tenor.com/m/fjFefVXbjosAAAAC/funny-dog-dance-dancing-dog.gif',
    'https://media1.tenor.com/m/QmWxjZNfSkIAAAAC/dog-dance-husky-dance.gif',
    'https://media1.tenor.com/m/lEBTm0RX_MwAAAAC/fireworks-firework.gif',
    'https://media1.tenor.com/m/I8lXFOqDjnwAAAAC/explosion-boom.gif',
    'https://media1.tenor.com/m/g485TTq4thoAAAAC/cat-cat-dance.gif',
    'https://media1.tenor.com/m/VRuuu3Eea5MAAAAC/%C3%B1am-lengua.gif',
    'https://media1.tenor.com/m/1eZJF7qDOIQAAAAC/beatboxing-cat-cat.gif'
  ];

  let lastSpawn = 0;

  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    // Add particle
    particles.push({
      x: mouse.x,
      y: mouse.y,
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2 + 1,
      life: 1,
      color: Math.random() > 0.5 ? '#00F3FF' : '#B53CFF'
    });

    // Prank image trail
    const now = Date.now();
    if (now - lastSpawn > 150) {
      lastSpawn = now;
      
      const el = document.createElement('img');
      el.src = prankUrls[Math.floor(Math.random() * prankUrls.length)];
      el.style.width = '80px';
      el.style.height = '80px';
      el.style.objectFit = 'contain';
      el.onerror = function() {
         if(this.src.endsWith('dog.png')) {
             this.src = 'https://i.imgur.com/2mJ2o3e.png'; // Doge fallback
         }
      };

      el.style.position = 'fixed';
      el.style.left = (mouse.x - 40) + 'px';
      el.style.top = (mouse.y - 40) + 'px';
      el.style.pointerEvents = 'none';
      el.style.zIndex = '9999';
      el.style.transition = 'transform 1s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 1s ease-out';
      el.style.transform = `scale(0.1) rotate(${(Math.random() - 0.5) * 90}deg)`;
      el.style.opacity = '1';

      document.body.appendChild(el);
      
      // Trigger reflow for animation
      void el.offsetWidth;
      el.style.transform = `translate(${(Math.random() - 0.5) * 150}px, ${(Math.random() - 0.5) * 150}px) scale(${Math.random() * 0.5 + 0.8}) rotate(${(Math.random() - 0.5) * 180}deg)`;
      
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform += ' translateY(100px) scale(0.5)';
      }, 500);
      
      setTimeout(() => {
        el.remove();
      }, 1500);
    }
  });

  // Background random prank spawners
  setInterval(() => {
      const img = document.createElement('img');
      img.src = bgPrankUrls[Math.floor(Math.random() * bgPrankUrls.length)];
      img.style.position = 'fixed';
      img.style.left = (Math.random() * window.innerWidth) + 'px';
      img.style.top = (Math.random() * window.innerHeight) + 'px';
      img.style.width = (Math.random() * 150 + 100) + 'px';
      img.style.pointerEvents = 'none';
      img.style.zIndex = '1'; // Behind the ticket
      img.style.opacity = '0';
      img.style.transition = 'opacity 1s ease-in, transform 3s linear';
      img.style.transform = `scale(0.5) rotate(${(Math.random() - 0.5) * 45}deg)`;
      
      document.body.appendChild(img);
      
      void img.offsetWidth;
      img.style.opacity = '0.4';
      img.style.transform = `scale(1) rotate(${(Math.random() - 0.5) * 90}deg) translateY(-100px)`;
      
      setTimeout(() => {
          img.style.opacity = '0';
      }, 2000);
      
      setTimeout(() => {
          img.remove();
      }, 3000);
  }, 1000);

  function drawTrail() {
    trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      let p = particles[i];
      p.x += p.vx;
      p.y -= p.vy;
      p.life -= 0.02;
      
      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }
      
      trailCtx.beginPath();
      trailCtx.arc(p.x, p.y, p.life * 3, 0, Math.PI*2);
      trailCtx.fillStyle = p.color;
      trailCtx.globalAlpha = p.life;
      trailCtx.fill();
      trailCtx.shadowBlur = 10;
      trailCtx.shadowColor = p.color;
      trailCtx.globalAlpha = 1;
      trailCtx.shadowBlur = 0;
    }
    requestAnimationFrame(drawTrail);
  }
  drawTrail();
  window.addEventListener('resize', () => {
    trailCanvas.width = window.innerWidth;
    trailCanvas.height = window.innerHeight;
  });

  // --- Countdown Logic ---
  const TARGET_MONTH = 7; // July
  const TARGET_DAY = 15;

  function getTarget(){
    const now = new Date();
    let year = now.getFullYear();
    let t = new Date(year, TARGET_MONTH-1, TARGET_DAY, 0,0,0,0);
    if (t.getTime() <= now.getTime()) t = new Date(year+1, TARGET_MONTH-1, TARGET_DAY);
    return t;
  }
  function getPrevBirthday(target){
    const prev = new Date(target);
    prev.setFullYear(target.getFullYear()-1);
    return prev;
  }

  let target = getTarget();
  let prevB = getPrevBirthday(target);

  const fill = document.getElementById('progress-fill');
  const pct = document.getElementById('progress-pct');

  function pad(n){ return String(n).padStart(2,'0'); }

  function setFlip(groupId, value){
    const root = document.getElementById(groupId);
    const card = root.querySelector('.flip-card');
    const front = card.querySelector('.flip-front');
    const back = card.querySelector('.flip-back');
    if (front.textContent === value) return;
    
    if (card.dataset.animating === '1') {
      card.style.transition = 'none';
      card.classList.remove('flipped');
      front.textContent = back.textContent || front.textContent;
      void card.offsetWidth;
      card.style.transition = '';
    }
    
    back.textContent = value;
    card.dataset.animating = '1';
    card.classList.add('flipped');
    
    const onEnd = () => {
      front.textContent = value;
      card.classList.remove('flipped');
      card.style.transition = 'none';
      void card.offsetWidth;
      card.style.transition = '';
      card.dataset.animating = '0';
      card.removeEventListener('transitionend', onEnd);
    };
    card.addEventListener('transitionend', onEnd);
  }

  let tickCount = 0;
  function tick(){
    const now = new Date();
    const diff = target.getTime() - now.getTime();

    if (diff <= 0){
      if(!document.getElementById('ticket').classList.contains('done')){
        celebrate();
      }
      return;
    }

    const days = Math.floor(diff/86400000);
    const hours = Math.floor((diff%86400000)/3600000);
    const mins = Math.floor((diff%3600000)/60000);
    const secs = Math.floor((diff%60000)/1000);

    setFlip('flip-days', pad(days));
    setFlip('flip-hours', pad(hours));
    setFlip('flip-mins', pad(mins));
    setFlip('flip-secs', pad(secs));

    const totalSpan = target.getTime() - prevB.getTime();
    const elapsed = now.getTime() - prevB.getTime();
    const p = Math.min(100, Math.max(0, (elapsed/totalSpan)*100));
    fill.style.width = p.toFixed(1)+'%';
    pct.textContent = Math.round(p)+'% there';

    tickCount++;
    document.getElementById('ticket').classList.toggle('tick-pulse', tickCount % 2 === 0);
  }

  tick();
  setInterval(tick, 1000);

  // --- Celebration & Confetti Engine ---
  function celebrate(){
    document.getElementById('ticket').classList.add('done');
    burstConfetti(window.innerWidth/2, window.innerHeight/2, 200);
  }

  const confCanvas = document.getElementById('confetti-canvas');
  const confCtx = confCanvas.getContext('2d');
  let confettis = [];
  
  window.addEventListener('resize', () => {
    confCanvas.width = window.innerWidth; 
    confCanvas.height = window.innerHeight;
  });
  confCanvas.width = window.innerWidth; 
  confCanvas.height = window.innerHeight;

  const confColors = ['#00F3FF', '#B53CFF', '#FF3366', '#FFD700', '#FFFFFF'];

  function burstConfetti(x, y, count = 50) {
    for(let i=0; i<count; i++) {
      confettis.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 15,
        vy: (Math.random() - 0.5) * 15 - 5,
        size: Math.random() * 8 + 4,
        color: confColors[Math.floor(Math.random() * confColors.length)],
        rot: Math.random() * 360,
        vRot: (Math.random() - 0.5) * 20,
        life: 1,
        decay: Math.random() * 0.01 + 0.005
      });
    }
    if (!confettiActive) {
      confettiActive = true;
      animateConfetti();
    }
  }

  let confettiActive = false;
  function animateConfetti() {
    if(confettis.length === 0) {
      confettiActive = false;
      confCtx.clearRect(0,0,confCanvas.width, confCanvas.height);
      return;
    }
    
    confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
    for(let i = confettis.length - 1; i >= 0; i--) {
      let c = confettis[i];
      c.vy += 0.2; // gravity
      c.x += c.vx;
      c.y += c.vy;
      c.rot += c.vRot;
      c.life -= c.decay;
      
      if(c.life <= 0 || c.y > confCanvas.height) {
        confettis.splice(i, 1);
        continue;
      }
      
      confCtx.save();
      confCtx.translate(c.x, c.y);
      confCtx.rotate(c.rot * Math.PI / 180);
      confCtx.globalAlpha = c.life;
      confCtx.fillStyle = c.color;
      confCtx.shadowBlur = 10;
      confCtx.shadowColor = c.color;
      confCtx.fillRect(-c.size/2, -c.size/2, c.size, c.size * 0.5);
      confCtx.restore();
    }
    requestAnimationFrame(animateConfetti);
  }


  // --- Buttons ---
  document.getElementById('calendarBtn').addEventListener('click', () => {
    const nameEl = document.querySelector('.headline .name');
    const name = (nameEl.textContent || 'Your').trim();
    const t = target;
    const y = t.getFullYear();
    const m = String(t.getMonth()+1).padStart(2,'0');
    const d = String(t.getDate()).padStart(2,'0');
    
    const ics = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'BEGIN:VEVENT',
      'DTSTART;VALUE=DATE:'+y+m+d,
      'SUMMARY:'+name+'\\\'s Birthday 🎉',
      'END:VEVENT',
      'END:VCALENDAR'
    ].join('\r\n');

    const blob = new Blob([ics], {type:'text/calendar'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name+'-birthday.ics';
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('shareBtn').addEventListener('click', async (e) => {
    const nameEl = document.querySelector('.headline .name');
    const name = (nameEl.textContent || 'Your').trim();
    const days = document.querySelector('#flip-days .flip-front').textContent;
    const msg = days+' days to go until '+name+'\'s magical birthday! ✨';
    const btn = e.currentTarget;
    try {
      await navigator.clipboard.writeText(msg);
      btn.textContent = 'Copied!';
      setTimeout(()=> btn.textContent = 'Copy countdown', 2000);
    } catch(err) {
      btn.textContent = 'Failed';
      setTimeout(()=> btn.textContent = 'Copy countdown', 2000);
    }
  });

})();
</script>
</body>
</html>
